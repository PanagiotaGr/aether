sensors:
  lidar:
    enabled: true
    range_m: 30.0
    range_noise_std_m: 0.03
    dropout_probability: 0.01
  depth_camera:
    enabled: true
    range_m: 12.0
    depth_noise_std_m: 0.05
    dropout_probability: 0.03
  imu:
    enabled: true
    accel_noise_std: 0.02
    gyro_noise_std: 0.01
    bias_random_walk_std: 0.001
  pose_source:
    mode: noisy_ground_truth
    position_noise_std_m: 0.05
    yaw_noise_std_rad: 0.02
